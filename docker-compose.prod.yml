services:
  web:
    build: .
    container_name: wabotti-web-prod
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://wabotti:wabotti@postgres:5432/wabotti?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wabotti-network

  postgres:
    image: postgres:15-alpine
    container_name: wabotti-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: wabotti
      POSTGRES_PASSWORD: wabotti
      POSTGRES_DB: wabotti
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wabotti -d wabotti"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wabotti-network
    # No ports exposed to host for security

  redis:
    image: redis:7-alpine
    container_name: wabotti-redis-prod
    restart: always
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wabotti-network
    # No ports exposed to host for security

networks:
  wabotti-network:
    driver: bridge

volumes:
  postgres_data_prod:
  redis_data_prod:
